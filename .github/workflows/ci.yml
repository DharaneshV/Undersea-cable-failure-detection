name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint check
        run: |
          python -c "import py_compile; py_compile.compile('model.py')"
          python -c "import py_compile; py_compile.compile('simulator.py')"
          python -c "import py_compile; py_compile.compile('api.py')"
          python -c "import py_compile; py_compile.compile('evaluate.py')"
          python -c "import py_compile; py_compile.compile('config.py')"
          python -c "import py_compile; py_compile.compile('utils.py')"

      - name: Run tests
        run: |
          python -m pytest tests/ -v
        env:
          TF_CPP_MIN_LOG_LEVEL: 3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend build check
        run: |
          cd frontend && npm ci && npm run build

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Test containers start
        run: |
          timeout 30 docker compose up -d || exit 1
          sleep 15
          docker compose ps

      - name: Stop containers
        if: always()
        run: docker compose down