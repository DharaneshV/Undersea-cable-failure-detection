services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./saved_model:/app/saved_model
      - ./datasets:/app/datasets
      - ./generated_reports:/app/generated_reports
    environment:
      - PYTHONUNBUFFERED=1
      - TF_CPP_MIN_LOG_LEVEL=2
    command: uvicorn api:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://api:8000
    depends_on:
      - api

  train:
    build: .
    volumes:
      - ./saved_model:/app/saved_model
      - ./datasets:/app/datasets
    environment:
      - PYTHONUNBUFFERED=1
    command: python model.py
    profiles:
      - debug